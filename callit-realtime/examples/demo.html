<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallIt Real-time Demo</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="../src/client.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
      border: 1px solid #2d2d44;
    }
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 15px;
      color: #667eea;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
    }
    .status.online {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    .status.offline {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    button:hover {
      background: #5a67d8;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #2d2d44;
      background: #0f0f23;
      color: white;
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .log {
      background: #0f0f23;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.8rem;
    }
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #1a1a2e;
    }
    .log-entry:last-child {
      border-bottom: none;
    }
    .log-time {
      color: #667eea;
    }
    .log-feed { color: #22c55e; }
    .log-comment { color: #f59e0b; }
    .log-notification { color: #ec4899; }
    .log-presence { color: #3b82f6; }
    .user-list {
      max-height: 150px;
      overflow-y: auto;
    }
    .user-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      background: #0f0f23;
      border-radius: 6px;
      margin-bottom: 6px;
    }
    .flex {
      display: flex;
      gap: 10px;
    }
    .flex-col {
      flex-direction: column;
    }
    .mt-2 { margin-top: 10px; }
    .typing-indicator {
      font-style: italic;
      color: #667eea;
      font-size: 0.85rem;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 CallIt Real-time Demo</h1>
    
    <div class="grid">
      <!-- Connection Card -->
      <div class="card">
        <h2>🔌 Connection</h2>
        <div class="flex flex-col">
          <input type="text" id="serverUrl" placeholder="ws://localhost:3001" value="ws://localhost:3001">
          <input type="text" id="userId" placeholder="User ID" value="user-" + Math.random().toString(36).substr(2, 9)>
          <input type="text" id="token" placeholder="Auth Token (optional)">
          <div class="flex">
            <button id="connectBtn" onclick="connect()">Connect</button>
            <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
          </div>
          <div class="mt-2">
            Status: <span id="connStatus" class="status offline"><span class="status-dot"></span> Disconnected</span>
          </div>
        </div>
      </div>

      <!-- Presence Card -->
      <div class="card">
        <h2>👥 Presence</h2>
        <div class="flex flex-col">
          <select id="statusSelect">
            <option value="online">Online</option>
            <option value="away">Away</option>
            <option value="busy">Busy</option>
            <option value="offline">Offline</option>
          </select>
          <button onclick="updateStatus()">Update Status</button>
          <button onclick="getOnlineUsers()" class="mt-2">Refresh Online Users</button>
          <div class="user-list mt-2" id="userList"></div>
        </div>
      </div>

      <!-- Feed Card -->
      <div class="card">
        <h2>📰 Feed</h2>
        <div class="flex flex-col">
          <input type="text" id="feedId" placeholder="Feed ID" value="main-feed">
          <div class="flex">
            <button onclick="subscribeFeed()">Subscribe</button>
            <button onclick="unsubscribeFeed()">Unsubscribe</button>
          </div>
          <div class="mt-2" id="feedStatus">Not subscribed</div>
        </div>
      </div>

      <!-- Comments Card -->
      <div class="card">
        <h2>💬 Comments</h2>
        <div class="flex flex-col">
          <input type="text" id="postId" placeholder="Post ID" value="post-123">
          <div class="flex">
            <button onclick="joinComments()">Join</button>
            <button onclick="leaveComments()">Leave</button>
          </div>
          <div class="typing-indicator mt-2" id="typingIndicator"></div>
          <div class="flex mt-2">
            <button onmousedown="startTyping()" onmouseup="stopTyping()" onmouseleave="stopTyping()">
              Simulate Typing
            </button>
          </div>
        </div>
      </div>

      <!-- Notifications Card -->
      <div class="card">
        <h2>🔔 Notifications</h2>
        <div class="flex flex-col">
          <input type="text" id="notifTitle" placeholder="Title" value="New Like!">
          <input type="text" id="notifBody" placeholder="Body" value="Someone liked your post">
          <button onclick="sendTestNotification()">Send Test Notification</button>
          <div class="mt-2" id="notifCount">Notifications received: 0</div>
        </div>
      </div>

      <!-- Event Log -->
      <div class="card" style="grid-column: 1 / -1;">
        <h2>📋 Event Log</h2>
        <div class="log" id="eventLog"></div>
        <button onclick="clearLog()" class="mt-2">Clear Log</button>
      </div>
    </div>
  </div>

  <script>
    let client = null;
    let notifCount = 0;

    function log(message, type = 'info') {
      const logEl = document.getElementById('eventLog');
      const time = new Date().toLocaleTimeString();
      const typeClass = {
        'feed': 'log-feed',
        'comment': 'log-comment',
        'notification': 'log-notification',
        'presence': 'log-presence'
      }[type] || '';
      
      logEl.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> <span class="${typeClass}">${message}</span></div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      document.getElementById('eventLog').innerHTML = '';
    }

    function updateConnectionStatus(connected) {
      const statusEl = document.getElementById('connStatus');
      if (connected) {
        statusEl.className = 'status online';
        statusEl.innerHTML = '<span class="status-dot"></span> Connected';
        document.getElementById('connectBtn').disabled = true;
        document.getElementById('disconnectBtn').disabled = false;
      } else {
        statusEl.className = 'status offline';
        statusEl.innerHTML = '<span class="status-dot"></span> Disconnected';
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
      }
    }

    async function connect() {
      const url = document.getElementById('serverUrl').value;
      const userId = document.getElementById('userId').value || 'user-' + Math.random().toString(36).substr(2, 9);
      const token = document.getElementById('token').value;

      client = new CallItRealtimeClient({ url });

      // Set up event handlers
      client.on('connect', () => {
        log('Connected to server');
        updateConnectionStatus(true);
      });

      client.on('disconnect', (reason) => {
        log(`Disconnected: ${reason}`);
        updateConnectionStatus(false);
      });

      client.on('error', (err) => {
        log(`Error: ${err.message || err}`, 'error');
      });

      client.on('auth:success', (data) => {
        log(`Authenticated! Socket ID: ${data.socketId}`);
      });

      client.on('feed:update', (data) => {
        log(`Feed update: ${JSON.stringify(data)}`, 'feed');
      });

      client.on('feed:new_post', (data) => {
        log(`New post: ${data.post?.title || 'Untitled'}`, 'feed');
      });

      client.on('comment:new', (data) => {
        log(`New comment on ${data.postId}: ${data.text?.substring(0, 50)}...`, 'comment');
      });

      client.on('comment:update', (data) => {
        log(`Comment updated: ${data.commentId}`, 'comment');
      });

      client.on('comment:delete', (data) => {
        log(`Comment deleted: ${data.commentId}`, 'comment');
      });

      client.on('comments:typing', (data) => {
        document.getElementById('typingIndicator').textContent = 
          data.isTyping ? `${data.userId} is typing...` : '';
      });

      client.on('notification:new', (data) => {
        notifCount++;
        document.getElementById('notifCount').textContent = `Notifications received: ${notifCount}`;
        log(`Notification: ${data.title} - ${data.body}`, 'notification');
      });

      client.on('notification:broadcast', (data) => {
        log(`Broadcast: ${data.title}`, 'notification');
      });

      client.on('presence:update', (data) => {
        log(`Presence: ${data.userId} is now ${data.status}`, 'presence');
        getOnlineUsers();
      });

      client.on('presence:list', (data) => {
        updateUserList(data.users);
      });

      try {
        await client.connect();
        await client.authenticate(userId, token);
      } catch (err) {
        log(`Connection failed: ${err.message}`, 'error');
      }
    }

    function disconnect() {
      if (client) {
        client.disconnect();
        client = null;
      }
      updateConnectionStatus(false);
    }

    function updateStatus() {
      if (!client) return;
      const status = document.getElementById('statusSelect').value;
      client.setStatus(status);
      log(`Status updated to: ${status}`);
    }

    function getOnlineUsers() {
      if (!client) return;
      client.getOnlineUsers().then(data => {
        updateUserList(data.users);
      });
    }

    function updateUserList(users) {
      const listEl = document.getElementById('userList');
      if (!users || users.length === 0) {
        listEl.innerHTML = '<div class="user-item">No users online</div>';
        return;
      }
      listEl.innerHTML = users.map(u => `
        <div class="user-item">
          <span>${u.userId}</span>
          <span class="status online" style="font-size: 0.75rem;">
            <span class="status-dot"></span> ${u.status}
          </span>
        </div>
      `).join('');
    }

    function subscribeFeed() {
      if (!client) return;
      const feedId = document.getElementById('feedId').value;
      client.subscribeToFeed(feedId).then(() => {
        document.getElementById('feedStatus').textContent = `Subscribed to: ${feedId}`;
        log(`Subscribed to feed: ${feedId}`);
      });
    }

    function unsubscribeFeed() {
      if (!client) return;
      const feedId = document.getElementById('feedId').value;
      client.unsubscribeFromFeed(feedId).then(() => {
        document.getElementById('feedStatus').textContent = 'Not subscribed';
        log(`Unsubscribed from feed: ${feedId}`);
      });
    }

    function joinComments() {
      if (!client) return;
      const postId = document.getElementById('postId').value;
      client.joinComments(postId).then(() => {
        log(`Joined comments for post: ${postId}`);
      });
    }

    function leaveComments() {
      if (!client) return;
      const postId = document.getElementById('postId').value;
      client.leaveComments(postId).then(() => {
        log(`Left comments for post: ${postId}`);
      });
    }

    function startTyping() {
      if (!client) return;
      const postId = document.getElementById('postId').value;
      client.setTyping(postId, true);
    }

    function stopTyping() {
      if (!client) return;
      const postId = document.getElementById('postId').value;
      client.setTyping(postId, false);
    }

    function sendTestNotification() {
      if (!client) return;
      // This would normally come from the server
      log('Test notification sent (server would push this)');
    }

    // Auto-generate user ID on load
    document.getElementById('userId').value = 'user-' + Math.random().toString(36).substr(2, 9);
  </script>
</body>
</html>

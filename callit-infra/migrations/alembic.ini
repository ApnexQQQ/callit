# Alembic configuration for CallIt database migrations

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# Timezone to use when rendering dates within migration files
timezone = UTC

# Version path separator
version_path_separator = os

# SQLAlchemy URL (can be overridden via environment variable)
sqlalchemy.url = postgresql+asyncpg://callit:callit_dev_password@localhost:5432/callit

[post_write_hooks]
# Format migration files with black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 88 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
